<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- White background with rounded corners -->
  <rect width="100" height="100" rx="22" fill="#ffffff"/>
  <!-- Clock circle -->
  <circle cx="50" cy="52" r="28" fill="none" stroke="#FFB3E5" stroke-width="1.5"/>
  <!-- Hour markers -->
  <line x1="50" y1="27" x2="50" y2="32" stroke="#FFB3E5" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="72" x2="50" y2="77" stroke="#FFB3E5" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="25" y1="52" x2="30" y2="52" stroke="#FFB3E5" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="70" y1="52" x2="75" y2="52" stroke="#FFB3E5" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Hour hand (pointing to 10) -->
  <line x1="50" y1="52" x2="37" y2="40" stroke="#FFB3E5" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Minute hand (pointing to 2) -->
  <line x1="50" y1="52" x2="62" y2="35" stroke="#FFB3E5" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="50" cy="52" r="2.5" fill="#FFB3E5"/>
</svg>
